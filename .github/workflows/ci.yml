name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  syntax-check:
    name: Python Syntax & Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Check Python syntax
        run: |
          find . -name "*.py" \
            ! -path "./.venv/*" \
            ! -path "./.git/*" \
            ! -path "./__pycache__/*" \
            | xargs -I {} python -m py_compile {}
          echo "All Python files parsed successfully"

      - name: Scan for hardcoded secrets
        run: |
          if grep -rn \
            -e "sk-ant-" \
            -e "OKTA_API_TOKEN\s*=\s*['\"][^$]" \
            -e "password\s*=\s*['\"][^$]" \
            --include="*.py" --include="*.yml" --include="*.yaml" .; then
            echo "ERROR: Potential hardcoded secret detected" && exit 1
          fi
          echo "No hardcoded secrets detected"

      - name: Verify .env is gitignored
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env is tracked by git" && exit 1
          fi
          echo ".env is correctly ignored"
